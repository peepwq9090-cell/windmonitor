<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SARAPHI TECHNICAL WIND SPEED MONITOR</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

.container{
    width:80%;
    max-width:900px;
    margin:30px auto;
}

.chart-box{
    height:400px;
    border:4px solid white;
    padding:10px;
}

#status{
    margin-top:20px;
    font-size:22px;
}
</style>
</head>

<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

<div class="container">
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div id="status">กำลังโหลดข้อมูล...</div>
</div>

<script>
async function loadData(){

    const statusText = document.getElementById("status");

    try{

        const response = await fetch(
        "https://api.thingspeak.com/channels/3279862/fields/1.json?results=20"
        );

        const data = await response.json();

        const labels = data.feeds.map(item => {
            const date = new Date(item.created_at);
            return date.toLocaleString("th-TH",{timeZone:"Asia/Bangkok"});
        });

        const values = data.feeds.map(item => Number(item.field1));

        const ctx = document.getElementById("chart").getContext("2d");

        new Chart(ctx,{
            type:"line",
            data:{
                labels:labels,
                datasets:[{
                    label:"Wind Speed",
                    data:values,
                    borderColor:"lime",
                    tension:0.4
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false
            }
        });

        const last = values[values.length-1];

        if(last>0){
            statusText.innerHTML="สถานการณ์ทำงาน : เปิด";
        }else{
            statusText.innerHTML="สถานการณ์ทำงาน : ปิด";
        }

    }catch(err){
        statusText.innerHTML="เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
    }
}

loadData();
setInterval(loadData,15000);
</script>

</body>
</html>
