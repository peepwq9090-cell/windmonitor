<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SARAPHI TECHNICAL WIND SPEED MONITOR TEST</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
    text-align:center;
}
h1{margin-top:20px}
.container{
    width:95%;
    margin:auto;
    display:grid;
    grid-template-columns: 1fr 2fr;
    grid-template-rows: 1fr 1fr;
    gap:20px;
}
.box{
    border:4px solid black;
    padding:10px;
}
.status{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
canvas{
    max-height:350px;
}
</style>
</head>
<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR TEST<br>
<small>(กราฟแสดงผล ทดสอบ)</small></h1>

<div class="container">
    <div class="box">
        <h3>กราฟแสดง 24 ชม.</h3>
        <canvas id="chart24"></canvas>
    </div>

    <div class="box" style="grid-row: span 2;">
        <h3>กราฟแสดงตลอด 1 ชม.</h3>
        <canvas id="chart1h"></canvas>
    </div>

    <div class="box">
        <h3>กราฟต่อวันบันทึกค่าสูงสุด</h3>
        <canvas id="chartDay"></canvas>
    </div>
</div>

<div class="status" id="status">สถานะการทำงาน : ( กำลังโหลด... )</div>

<script>
const CHANNEL_ID = "3279862";
const READ_API_KEY = "ใส่_READ_API_KEY_ตรงนี้";
const FIELD = 1;

async function loadData(){
    const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=300`);
    const data = await res.json();

    let times = [];
    let values = [];

    data.feeds.forEach(f=>{
        if(f[`field${FIELD}`]){
            const utc = new Date(f.created_at);
            const thai = new Date(utc.getTime() + (7*60*60*1000));
            times.push(thai);
            values.push(parseFloat(f[`field${FIELD}`]));
        }
    });

    // ===== 1 ชั่วโมงล่าสุด =====
    const now = new Date();
    const oneHourAgo = now - 3600000;
    let times1h = [];
    let values1h = [];

    times.forEach((t,i)=>{
        if(t >= oneHourAgo){
            times1h.push(t.toLocaleTimeString("th-TH"));
            values1h.push(values[i]);
        }
    });

    // ===== ค่าสูงสุดรายวัน =====
    let dailyMax = {};
    times.forEach((t,i)=>{
        let d = t.toLocaleDateString("th-TH");
        if(!dailyMax[d] || values[i] > dailyMax[d]){
            dailyMax[d] = values[i];
        }
    });

    // ===== สถานะ =====
    const status = values.length > 0 ? "เปิด" : "ปิด";
    document.getElementById("status").innerHTML =
        `สถานะการทำงาน : ( ${status} )`;

    // ===== กราฟ 24 ชม =====
    new Chart(document.getElementById("chart24"),{
        type:"line",
        data:{
            labels: times.map(t=>t.toLocaleTimeString("th-TH")),
            datasets:[{data:values}]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });

    // ===== กราฟ 1 ชม =====
    new Chart(document.getElementById("chart1h"),{
        type:"line",
        data:{
            labels: times1h,
            datasets:[{data:values1h}]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });

    // ===== กราฟรายวัน =====
    new Chart(document.getElementById("chartDay"),{
        type:"bar",
        data:{
            labels:Object.keys(dailyMax),
            datasets:[{data:Object.values(dailyMax)}]
        },
        options:{
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });
}

loadData();
setInterval(loadData, 30000); // รีเฟรชทุก 30 วิ
</script>

</body>
</html>
