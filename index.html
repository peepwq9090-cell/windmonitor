<h1 style="text-align:center;">SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

<div style="width:80%; margin:auto;">
    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function loadData() {

    const response = await fetch(
        "https://api.thingspeak.com/channels/3279862/fields/1.json?results=20"
    );

    const data = await response.json();

    // แปลงเวลาเป็นเวลาไทย
    const labels = data.feeds.map(item => {
        const date = new Date(item.created_at);
        return date.toLocaleString("th-TH", {
            timeZone: "Asia/Bangkok"
        });
    });

    const values = data.feeds.map(item => item.field1);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Wind Speed (m/s)",
                data: values,
                borderColor: "lime",
                backgroundColor: "rgba(0,255,0,0.1)",
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,   // ไม่ให้เต็มจอ
            scales: {
                x: {
                    ticks: { color: "black" }
                },
                y: {
                    ticks: { color: "black" }
                }
            }
        }
    });
}

loadData();
</script>
