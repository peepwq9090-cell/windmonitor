<h1>SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function loadData() {
    const response = await fetch(
        "https://api.thingspeak.com/channels/3279904/fields/1.json?results=20"
    );

    const data = await response.json();

    const labels = data.feeds.map(item => item.created_at);
    const values = data.feeds.map(item => item.field1);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Wind Speed",
                data: values,
                borderColor: "white",
                backgroundColor: "rgba(255,255,255,0.1)",
                tension: 0.3
            }]
        },
        options: {
            scales: {
                x: { ticks: { color: "white" }},
                y: { ticks: { color: "white" }}
            },
            plugins: {
                legend: { labels: { color: "white" }}
            }
        }
    });
}

loadData();
</script>
