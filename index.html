<!DOCTYPE html>
<html>
<head>
    <title>SARAPHI TECHNICAL WIND SPEED MONITOR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            margin-top: 20px;
        }
        canvas {
            max-width: 900px;
            margin: auto;
        }
        #status {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

<canvas id="windChart"></canvas>
<div id="status"></div>

<script>
const channelID = "3279862";
const readAPI = "RW4WW5ICILK0P78L";
const fieldNumber = "1";

const ctx = document.getElementById('windChart').getContext('2d');

const windChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Wind Speed',
            data: [],
            borderColor: 'lime',
            backgroundColor: 'transparent',
            tension: 0.4
        }]
    },
    options: {
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        },
        plugins: {
            legend: {
                labels: { color: 'white' }
            }
        }
    }
});

async function fetchData() {
    try {
        const response = await fetch(
            `https://api.thingspeak.com/channels/${channelID}/fields/${fieldNumber}.json?api_key=${readAPI}&results=20`
        );
        const data = await response.json();

        const labels = [];
        const values = [];

        data.feeds.forEach(feed => {
            if (feed[`field${fieldNumber}`] !== null) {
                labels.push(new Date(feed.created_at).toLocaleTimeString());
                values.push(parseFloat(feed[`field${fieldNumber}`]));
            }
        });

        windChart.data.labels = labels;
        windChart.data.datasets[0].data = values;
        windChart.update();

        document.getElementById("status").innerText = "เชื่อมต่อปกติ";
        document.getElementById("status").style.color = "lime";

    } catch (error) {
        document.getElementById("status").innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
        document.getElementById("status").style.color = "red";
    }
}

// โหลดครั้งแรก
fetchData();

// รีเฟรชทุก 5 วินาที (Real Time)
setInterval(fetchData, 5000);
</script>

</body>
</html>
