<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Speed Monitor</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#e6e6e6;
    text-align:center;
}

h1{
    margin-top:20px;
    font-size:40px;
}

.sub{
    font-size:22px;
}

.container{
    width:95%;
    margin:auto;
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-gap:20px;
    margin-top:30px;
}

.box{
    background:white;
    border:6px solid black;
    padding:10px;
}

.left-column{
    display:grid;
    grid-template-rows: 1fr 1fr;
    grid-gap:20px;
}

iframe{
    width:100%;
    height:250px;
    border:none;
}

.status{
    margin-top:40px;
    font-size:32px;
}
</style>
</head>

<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR TEST</h1>
<div class="sub">(กราฟแสดงผล ทดสอบ)</div>

<div class="container">

    <!-- ฝั่งซ้าย -->
    <div class="left-column">
        
        <div class="box">
            <h2>กราฟแสดง 24 ชม.</h2>
            <iframe src="https://thingspeak.com/channels/3279862/charts/1?api_key=YOUR_READ_KEY&days=1">
            </iframe>
        </div>

        <div class="box">
            <h2>กราฟต่อวันบันทึกค่าสูงสุด</h2>
            <iframe src="https://thingspeak.com/channels/3279862/charts/1?api_key=YOUR_READ_KEY&average=1440">
            </iframe>
        </div>

    </div>

    <!-- ฝั่งขวา -->
    <div class="box">
        <h2>กราฟแสดงตลอด 1 ชม.</h2>
        <iframe src="https://thingspeak.com/channels/3279862/charts/1?api_key=YOUR_READ_KEY&minutes=60">
        </iframe>
    </div>

</div>

<div class="status">
    สถานการณ์ทำงาน : <b>เปิด</b>
</div>

</body>
</html>
thingspeak.com
