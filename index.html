<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SARAPHI TECHNICAL WIND SPEED MONITOR TEST</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:Arial;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.box{
    border:2px solid white;
    padding:15px;
}

canvas{
    background:#000;
}

.status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR TEST</h1>

<div class="container">

<div class="box">
<h3>กราฟ 24 ชม.</h3>
<canvas id="chart24"></canvas>
</div>

<div class="box">
<h3>กราฟแสดงตลอด 1 ชม.</h3>
<canvas id="chart1h"></canvas>
</div>

<div class="box">
<h3>กราฟต่อวันบันทึกค่าสูงสุด</h3>
<canvas id="chartDaily"></canvas>
</div>

</div>

<div class="status" id="status">กำลังโหลดข้อมูล...</div>

<script>

const channelID = 3279862;
const readAPI = "RW4WW5ICILK0P78L";

function thaiDateTime(dateString){
    let d = new Date(dateString);
    return d.toLocaleString("th-TH",{
        timeZone:"Asia/Bangkok",
        year:"2-digit",
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}

function createChart(ctx,type){
    return new Chart(ctx,{
        type:type,
        data:{
            labels:[],
            datasets:[{
                data:[],
                borderColor:"#00ff00",
                backgroundColor:"rgba(0,255,0,0.2)",
                tension:0.3
            }]
        },
        options:{
            responsive:true,
            plugins:{ legend:{ display:false } },
            scales:{
                x:{ ticks:{ color:"white" }},
                y:{
                    min:0,
                    max:100,
                    ticks:{ color:"white" }
                }
            }
        }
    });
}

const chart24 = createChart(document.getElementById("chart24"),"line");
const chart1h = createChart(document.getElementById("chart1h"),"line");
const chartDaily = createChart(document.getElementById("chartDaily"),"bar");

async function updateCharts(){

try{

// -------- 24 ชั่วโมง --------
let res24 = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&results=200`);
let data24 = await res24.json();

const labels24 = data24.feeds.map(f=>thaiDateTime(f.created_at));
const values24 = data24.feeds.map(f=>Number(f.field1));

chart24.data.labels = labels24;
chart24.data.datasets[0].data = values24;
chart24.update();


// -------- 1 ชั่วโมง --------
let oneHourAgo = new Date(Date.now() - 60*60*1000);

const feeds1h = data24.feeds.filter(f=>{
    return new Date(f.created_at) >= oneHourAgo;
});

if(feeds1h.length === 0){
    chart1h.data.labels = ["ไม่มีข้อมูล"];
    chart1h.data.datasets[0].data = [0];
}else{
    chart1h.data.labels = feeds1h.map(f=>thaiDateTime(f.created_at));
    chart1h.data.datasets[0].data = feeds1h.map(f=>Number(f.field1));
}

chart1h.update();


// -------- ค่าสูงสุดต่อวัน --------
const grouped = {};

data24.feeds.forEach(f=>{
    const thaiDate = new Date(f.created_at)
    .toLocaleDateString("th-TH",{timeZone:"Asia/Bangkok"});

    const val = Number(f.field1);

    if(!grouped[thaiDate] || val > grouped[thaiDate]){
        grouped[thaiDate] = val;
    }
});

chartDaily.data.labels = Object.keys(grouped);
chartDaily.data.datasets[0].data = Object.values(grouped);
chartDaily.update();


// -------- เช็คสถานะ --------
if(data24.feeds.length === 0){
    document.getElementById("status").innerHTML = "⚠ ไม่มีข้อมูลจากเซิร์ฟเวอร์";
    document.getElementById("status").style.color="orange";
}else{
    document.getElementById("status").innerHTML = "เชื่อมต่อปกติ";
    document.getElementById("status").style.color="#00ff00";
}

}catch(e){

document.getElementById("status").innerHTML = "⚠ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์";
document.getElementById("status").style.color="orange";

}

}

updateCharts();
setInterval(updateCharts,10000);

</script>

</body>
</html>
