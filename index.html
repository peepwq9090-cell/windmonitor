<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SARAPHI TECHNICAL WIND SPEED MONITOR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:black; color:white; text-align:center;">

    <h1>SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

    <canvas id="chart" width="800" height="400"></canvas>

    <h2 id="status">สถานะการทำงาน : กำลังโหลด...</h2>

<script>
async function loadData() {

    const response = await fetch(
        "https://api.thingspeak.com/channels/3279862/feeds.json?results=20"
    );

    const data = await response.json();

    const labels = data.feeds.map(item => item.created_at);
    const values = data.feeds.map(item => item.field1);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Wind Speed",
                data: values,
                borderColor: "lime",
                backgroundColor: "rgba(0,255,0,0.2)",
                tension: 0.3
            }]
        },
        options: {
            scales: {
                x: { ticks: { color: "white" }},
                y: { ticks: { color: "white" }}
            },
            plugins: {
                legend: { labels: { color: "white" }}
            }
        }
    });

    // แสดงสถานะ เปิด / ปิด (ถ้าค่า > 0 = เปิด)
    const latestValue = values[values.length - 1];

    if (latestValue > 0) {
        document.getElementById("status").innerHTML = 
            "สถานะการทำงาน : เปิด";
    } else {
        document.getElementById("status").innerHTML = 
            "สถานะการทำงาน : ปิด";
    }
}

loadData();

// รีเฟรชข้อมูลทุก 15 วินาที
setInterval(() => {
    location.reload();
}, 15000);

</script>

</body>
</html>
