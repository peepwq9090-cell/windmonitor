<script>
async function loadData() {

    const statusText = document.getElementById("status");
    statusText.innerHTML = "กำลังโหลดข้อมูล...";

    try {

        const response = await fetch(
            "https://api.thingspeak.com/channels/3279862/fields/1.json?results=20"
        );

        if(!response.ok){
            throw new Error("Network response error");
        }

        const data = await response.json();

        if(!data.feeds || data.feeds.length === 0){
            statusText.innerHTML = "ไม่มีข้อมูล";
            return;
        }

        const labels = data.feeds.map(item => {
            const date = new Date(item.created_at);
            return date.toLocaleString("th-TH", {
                timeZone: "Asia/Bangkok"
            });
        });

        const values = data.feeds.map(item => Number(item.field1));

        const ctx = document.getElementById("chart").getContext("2d");

        new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Wind Speed (m/s)",
                    data: values,
                    borderColor: "green",
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        const lastValue = values[values.length - 1];

        if(lastValue > 0){
            statusText.innerHTML = "สถานการณ์ทำงาน : เปิด";
        }else{
            statusText.innerHTML = "สถานการณ์ทำงาน : ปิด";
        }

    } catch(error){
        statusText.innerHTML = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (ตรวจสอบอินเทอร์เน็ต)";
    }
}

loadData();
</script>
