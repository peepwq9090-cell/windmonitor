<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Monitor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color:white;
    text-align:center;
}

.container{
    padding:40px;
}

.card{
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
    width:80%;
    max-width:900px;
    margin:30px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    margin-top:20px;
    font-size:40px;
}

.subtitle{
    font-size:18px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌬 Wind Speed Monitor</h1>
    <div class="subtitle">Real-Time Wind Speed Data</div>

    <div class="card">
        <iframe width="100%" height="400"
        src="https://thingspeak.com/channels/3279904/charts/1?dynamic=true">
        </iframe>
    </div>
</div>

</body>
</html>
