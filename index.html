<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SARAPHI TECHNICAL WIND SPEED MONITOR</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    display:grid;
    grid-template-columns: 1fr 2fr;
    grid-template-rows: 320px 320px;
    gap:20px;
    width:90%;
    margin:auto;
    margin-top:30px;
}

.box{
    border:3px solid white;
    padding:10px;
    background:#111;
}

canvas{
    margin-top:10px;
}

#status{
    margin-top:30px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR TEST</h1>

<div class="container">

    <div class="box">
        <h3>กราฟ 24 ชม.</h3>
        <canvas id="chart24h"></canvas>
    </div>

    <div class="box">
        <h3>กราฟแสดงตลอด 1 ชม.</h3>
        <canvas id="chart1h"></canvas>
    </div>

    <div class="box">
        <h3>กราฟต่อวันบันทึกค่าสูงสุด</h3>
        <canvas id="chartDaily"></canvas>
    </div>

</div>

<div id="status">กำลังตรวจสอบสถานะ...</div>

<script>

const channelID = 3279862;
const readAPI = "RW4WW5ICILK0P78L";

let chart24h, chart1h, chartDaily;

function thaiTime(dateString){
    let d = new Date(dateString);
    return d.toLocaleTimeString("th-TH",{timeZone:"Asia/Bangkok"});
}

async function fetchData(minutes){
    const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&minutes=${minutes}`;
    const res = await fetch(url);
    return await res.json();
}

function createChart(canvas){
    return new Chart(canvas, {
        type:'line',
        data:{
            labels:[],
            datasets:[{
                data:[],
                borderColor:"#00ff00",
                tension:0.4
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            layout:{ padding:{ bottom:20 }},
            scales:{
                x:{
                    ticks:{
                        color:"white",
                        maxTicksLimit:8,
                        maxRotation:45,
                        minRotation:45
                    }
                },
                y:{
                    ticks:{ color:"white" },
                    beginAtZero:true
                }
            },
            plugins:{
                legend:{ display:false }
            }
        }
    });
}

async function updateCharts(){
    try{

        const data24 = await fetchData(1440);
        const labels24 = data24.feeds.map(f=>thaiTime(f.created_at));
        const values24 = data24.feeds.map(f=>Number(f.field1));

        chart24h.data.labels = labels24;
        chart24h.data.datasets[0].data = values24;
        chart24h.update();

        const data1 = await fetchData(60);
        const labels1 = data1.feeds.map(f=>thaiTime(f.created_at));
        const values1 = data1.feeds.map(f=>Number(f.field1));

        chart1h.data.labels = labels1;
        chart1h.data.datasets[0].data = values1;
        chart1h.update();

        // daily max
        const grouped={};
        data24.feeds.forEach(f=>{
            const date=new Date(f.created_at).toLocaleDateString("th-TH",{timeZone:"Asia/Bangkok"});
            const val=Number(f.field1);
            if(!grouped[date] || val>grouped[date]){
                grouped[date]=val;
            }
        });

        chartDaily.data.labels=Object.keys(grouped);
        chartDaily.data.datasets[0].data=Object.values(grouped);
        chartDaily.update();

        // status check
        const lastTime=new Date(data1.feeds[data1.feeds.length-1].created_at);
        const now=new Date();
        const diff=(now-lastTime)/1000;

        if(diff>60){
            status.innerHTML="🔴 ระบบปิด / ไม่ส่งข้อมูล";
            status.style.color="red";
        }else{
            status.innerHTML="🟢 ระบบเปิด / ทำงานปกติ";
            status.style.color="lime";
        }

    }catch{
        status.innerHTML="⚠ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์";
        status.style.color="orange";
    }
}

window.onload=()=>{
    chart24h=createChart(document.getElementById("chart24h"));
    chart1h=createChart(document.getElementById("chart1h"));
    chartDaily=createChart(document.getElementById("chartDaily"));

    updateCharts();
    setInterval(updateCharts,15000);
}

</script>

</body>
</html>
