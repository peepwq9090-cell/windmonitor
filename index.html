<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Monitoring</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#ffffff;
  --sub:#94a3b8;
  --btn:#334155;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:var(--card);
}

button{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:var(--btn);
  color:white;
  cursor:pointer;
}

.card{
  background:var(--card);
  margin:20px;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.light{
  --bg:#ffffff;
  --card:#f1f5f9;
  --text:#111827;
  --sub:#475569;
  --btn:#e2e8f0;
}
</style>
</head>

<body>

<header>
  <h2>SARAPHI TECHNICAL</h2>
  <button id="modeBtn" onclick="toggleMode()">Light Mode</button>
</header>

<div class="card">
  <h3>ตัวอย่างการ์ด</h3>
  <p>เมื่อกดปุ่มจะเปลี่ยนธีมขาว/ดำ และข้อความปุ่มจะสลับ</p>
</div>

<script>
function toggleMode(){
  const body = document.body;
  const btn = document.getElementById("modeBtn");

  body.classList.toggle("light");

  if(body.classList.contains("light")){
    btn.innerText = "Dark Mode";
  }else{
    btn.innerText = "Light Mode";
  }
}
</script>

</body>
</html>
