<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Speed Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f4f6f9;
}

.header{
    background:#1f2937;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status-box{
    text-align:right;
}

.dashboard{
    padding:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    padding:15px;
}

.full{
    grid-column:span 2;
}

canvas{
    width:100%;
    height:280px;
}

.footer{
    text-align:center;
    padding:15px;
    font-weight:bold;
}

.badge{
    padding:5px 10px;
    border-radius:20px;
    font-size:14px;
    color:white;
}

.normal{ background:green; }
.warning{ background:orange; }
.danger{ background:red; }

.big-number{
    font-size:28px;
}
</style>
</head>

<body>

<div class="header">
    <div>
        <h2>SARAPHI TECHNICAL</h2>
        Wind Speed Monitoring System
    </div>

    <div class="status-box">
        <div class="big-number">Current Wind: <b id="currentWind">0</b> m/s</div>
        <div>Status: <span id="statusBadge" class="badge normal">NORMAL</span></div>
    </div>
</div>

<div class="dashboard">

    <div class="card">
        <h3>24 ชั่วโมง (ค่าสูงสุดรายชั่วโมง)</h3>
        <canvas id="chart24"></canvas>
    </div>

    <div class="card">
        <h3>5 นาทีล่าสุด</h3>
        <canvas id="chart5m"></canvas>
    </div>

    <div class="card full">
        <h3>ค่าสูงสุดรายวัน (7 วัน)</h3>
        <canvas id="chart7d"></canvas>
    </div>

</div>

<div class="footer">
สถานะการทำงาน: ONLINE | Demo Mode
</div>

<script>

// ====== สร้างข้อมูลปลอม ======

function randomData(length, max){
    return Array.from({length}, () => Math.floor(Math.random()*max));
}

// 24 ชั่วโมง (24 ค่า)
let data24 = randomData(24, 60);
let labels24 = Array.from({length:24}, (_,i)=> i+":00");

// 5 นาทีล่าสุด (20 ค่า)
let data5m = randomData(20, 50);
let labels5m = Array.from({length:20}, (_,i)=> i);

// 7 วัน
let data7d = randomData(7, 80);
let labels7d = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ====== สร้างกราฟ ======

function makeChart(id, labels, data){
    return new Chart(document.getElementById(id),{
        type:'line',
        data:{
            labels:labels,
            datasets:[{
                data:data,
                borderWidth:2,
                tension:0.3,
                fill:false
            }]
        },
        options:{
            responsive:true,
            plugins:{
                legend:{display:false}
            },
            scales:{
                y:{beginAtZero:true}
            }
        }
    });
}

makeChart("chart24", labels24, data24);
makeChart("chart5m", labels5m, data5m);
makeChart("chart7d", labels7d, data7d);

// ====== จำลองค่า Current Wind ======

function updateWind(){
    let value = Math.floor(Math.random()*70);
    document.getElementById("currentWind").innerText = value;

    let badge = document.getElementById("statusBadge");

    if(value < 30){
        badge.className = "badge normal";
        badge.innerText = "NORMAL";
    }
    else if(value < 50){
        badge.className = "badge warning";
        badge.innerText = "WARNING";
    }
    else{
        badge.className = "badge danger";
        badge.innerText = "DANGER";
    }
}

setInterval(updateWind,2000);
updateWind();

</script>

</body>
</html>
cdn.jsdelivr.net
