<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Speed IoT Dashboard</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background-color:#0f0f0f;
    color:white;
}

.header{
    padding:25px;
    font-size:32px;
    font-weight:600;
    letter-spacing:2px;
    border-bottom:1px solid #222;
}

.container{
    padding:40px;
}

.card{
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    margin-bottom:30px;
}

.value{
    font-size:60px;
    font-weight:bold;
    margin-top:10px;
}

.label{
    color:#888;
    font-size:14px;
    letter-spacing:1px;
}

iframe{
    border:none;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
    WIND SPEED MONITOR
</div>

<div class="container">

    <div class="card">
        <div class="label">Current Wind Speed</div>
        <div class="value">
            <iframe 
            width="200" 
            height="80"
            src="https://thingspeak.com/channels/3279904/widgets/912277">
            </iframe>
        </div>
    </div>

    <div class="card">
        <div class="label">Wind Speed Graph</div>
        <br>
        <iframe 
        width="100%" 
        height="400"
        src="https://thingspeak.com/channels/3279904/charts/1?bgcolor=%231a1a1a&color=%23ffffff&dynamic=true&results=60&type=line">
        </iframe>
    </div>

</div>

</body>
</html>
