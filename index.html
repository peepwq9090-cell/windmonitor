<script>
/* ===== CONFIG ===== */
const CH    = '3279862';
const RKEY  = 'RW4WW5ICILK0P78L';
const BASE  = `https://api.thingspeak.com/channels/${CH}`;
const FIELD = 'field1';

/* ===== CHART FACTORY ===== */
function mkChart(id, color, extraOpts = {}){
    return new Chart(document.getElementById(id), {
        type:'line',
        data:{
            labels:[],
            datasets:[{
                data:[],
                borderColor: color,
                backgroundColor: color.replace('1)', '0.12)'),
                borderWidth:2,
                tension:0.3,
                fill:true,
                pointRadius:3,
                spanGaps:false
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            animation:{ duration:400 },
            plugins:{ legend:{ display:false } },
            scales:{
                y:{ beginAtZero:true, max:90 },
                x:{ ticks:{ maxTicksLimit: extraOpts.maxTicks || 12 } }
            }
        }
    });
}

const c24 = mkChart('chart24', 'rgba(59,130,246,1)');
const c5m = mkChart('chart5m', 'rgba(16,185,129,1)');
const c7d = mkChart('chart7d', 'rgba(245,158,11,1)');

function applyChart(chart, labels, data){
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.update();
}

/* ===== FILL TIMELINE ===== */
function fillTimeline(feeds, slotMs, totalSlots){
    const now   = Date.now();
    const start = now - (totalSlots - 1) * slotMs;
    const slots = new Array(totalSlots).fill(0);

    feeds.forEach(f=>{
        const t   = new Date(f.created_at).getTime();
        const idx = Math.round((t - start) / slotMs);
        if(idx>=0 && idx<totalSlots){
            const v = parseFloat(f[FIELD]);
            if(!isNaN(v)) slots[idx] = Math.max(slots[idx], v);
        }
    });

    const times = Array.from({length: totalSlots}, (_,i)=> new Date(start+i*slotMs));
    return { slots, times };
}

/* ===== FORMAT ===== */
function fmtH(t){ return `${t.getHours()}.00`; }

function fmtHM(t){
    return `${String(t.getHours()).padStart(2,'0')}.${String(t.getMinutes()).padStart(2,'0')}`;
}

/* ===== BADGE ===== */
function updateBadge(val){
    document.getElementById('windValue').innerText =
        (val!==null)? val.toFixed(1) : '–';

    const b=document.getElementById('statusBadge');

    if(val===null){ b.className='badge normal'; b.innerText='NO DATA'; return; }
    if(val<30){ b.className='badge normal'; b.innerText='NORMAL'; }
    else if(val<50){ b.className='badge warning'; b.innerText='WARNING'; }
    else{ b.className='badge danger'; b.innerText='DANGER'; }
}

/* ===== CONNECTION ===== */
function setConn(ok,timeStr){
    const dot=document.getElementById('connDot');
    const lbl=document.getElementById('connLabel');
    const ls=document.getElementById('lastSeen');

    if(ok){
        dot.className='conn-dot';
        lbl.className='conn-label ok';
        lbl.innerText='( เปิด )';
        ls.innerText=timeStr?`· อัปเดต ${timeStr}`:'';
    }else{
        dot.className='conn-dot off';
        lbl.className='conn-label fail';
        lbl.innerText='( ปิด )';
        ls.innerText=timeStr?`· ข้อมูลล่าสุด ${timeStr}`:'· ไม่มีข้อมูล';
    }
}

/* ===== FETCH 5 MIN ===== */
async function fetch5m(){
    try{
        const url = `${BASE}/feeds.json?api_key=${RKEY}&minutes=5&results=8000`;
        const res = await fetch(url);
        const json= await res.json();
        const feeds=(json.feeds||[]).filter(f=>f[FIELD]);

        const {slots,times}=fillTimeline(feeds,30000,10);
        applyChart(c5m,times.map(fmtHM),slots);

        if(feeds.length){
            const last=feeds[feeds.length-1];
            const lastDt=new Date(last.created_at);
            const secAgo=(Date.now()-lastDt.getTime())/1000;
            const ok=secAgo<=60;
            updateBadge(ok?parseFloat(last[FIELD]):null);
            setConn(ok,lastDt.toLocaleTimeString('th-TH'));
        }else{
            updateBadge(null);
            setConn(false,null);
        }

    }catch(e){
        console.error(e);
        updateBadge(null);
        setConn(false,null);
    }
}

/* ===== FETCH 24H ===== */
async function fetch24h(){
    try{
        const url=`${BASE}/feeds.json?api_key=${RKEY}&minutes=1440&results=8000`;
        const res=await fetch(url);
        const json=await res.json();
        const feeds=(json.feeds||[]).filter(f=>f[FIELD]);

        const {slots,times}=fillTimeline(feeds,3600000,24);
        applyChart(c24,times.map(fmtH),slots);

    }catch(e){ console.error(e); }
}

/* ===== FETCH 7D ===== */
async function fetch7d(){
    try{
        const url=`${BASE}/feeds.json?api_key=${RKEY}&days=7&results=8000`;
        const res=await fetch(url);
        const json=await res.json();
        const feeds=(json.feeds||[]).filter(f=>f[FIELD]);

        const {slots,times}=fillTimeline(feeds,86400000,7);
        const DAY=['อา','จ','อ','พ','พฤ','ศ','ส'];
        const labels=times.map(t=>`${DAY[t.getDay()]} ${t.getDate()}/${t.getMonth()+1}`);
        applyChart(c7d,labels,slots);

    }catch(e){ console.error(e); }
}

/* ===== START ===== */
fetch5m();
fetch24h();
fetch7d();

setInterval(fetch5m,15000);
setInterval(fetch24h,300000);
setInterval(fetch7d,1800000);

/* ===== DARK MODE ===== */
function toggleDark(){
    const isDark=document.body.classList.toggle('dark');
    document.getElementById('toggleBtn').innerText=
        isDark?'☀️ Light Mode':'🌙 Dark Mode';
}
</script>
