<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#f2f2f2;
    font-family: Arial, sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
}

.graph-box{
    width:900px;
    height:400px;
    margin:30px auto;
    border:5px solid black;
    background:white;
    padding:20px;
}

canvas{
    width:100% !important;
    height:100% !important;
}

.status{
    font-size:22px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>
SARAPHI TECHNICAL WIND SPEED MONITOR TEST <br>
( กราฟแสดงผล ทดสอบ )
</h1>

<div class="graph-box">
    <canvas id="chart"></canvas>
</div>

<div class="status" id="status">
สถานการณ์ทำงาน : กำลังโหลด...
</div>

<script>
async function loadData() {

    const response = await fetch(
        "https://api.thingspeak.com/channels/3279862/fields/1.json?results=20"
    );

    const data = await response.json();

    // เวลาไทย
    const labels = data.feeds.map(item => {
        const date = new Date(item.created_at);
        return date.toLocaleString("th-TH", {
            timeZone: "Asia/Bangkok"
        });
    });

    const values = data.feeds.map(item => item.field1);

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Wind Speed (m/s)",
                data: values,
                borderColor: "black",
                backgroundColor: "rgba(0,0,0,0.1)",
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    // เช็คสถานะ (ถ้ามีค่ามากกว่า 0 = เปิด)
    const lastValue = values[values.length - 1];

    if(lastValue > 0){
        document.getElementById("status").innerHTML =
        "สถานการณ์ทำงาน : เปิด";
    }else{
        document.getElementById("status").innerHTML =
        "สถานการณ์ทำงาน : ปิด";
    }
}

loadData();
</script>

</body>
</html>
