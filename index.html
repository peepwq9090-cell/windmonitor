<!DOCTYPE html>
<html>
<head>
    <title>SARAPHI TECHNICAL WIND SPEED MONITOR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            margin-top: 20px;
            font-size: 32px;
        }

        .chart-container {
            width: 95%;
            height: 70vh;
            margin: auto;
        }

        #status {
            font-size: 22px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>SARAPHI TECHNICAL WIND SPEED MONITOR</h1>

<div class="chart-container">
    <canvas id="windChart"></canvas>
</div>

<div id="status">กำลังเชื่อมต่อ...</div>

<script>
const channelID = "3279862";
const readAPI = "RW4WW5ICILK0P78L";
const fieldNumber = "1";

const ctx = document.getElementById('windChart').getContext('2d');

const windChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Wind Speed',
            data: [],
            borderColor: 'lime',
            borderWidth: 3,
            pointRadius: 4,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        },
        plugins: {
            legend: {
                labels: { color: 'white', font: { size: 18 } }
            }
        }
    }
});

let lastDataTime = null;

async function fetchData() {
    try {
        const response = await fetch(
            `https://api.thingspeak.com/channels/${channelID}/fields/${fieldNumber}.json?api_key=${readAPI}&results=20`
        );

        const data = await response.json();

        const labels = [];
        const values = [];

        data.feeds.forEach(feed => {
            if (feed[`field${fieldNumber}`] !== null) {
                const thaiTime = new Date(feed.created_at).toLocaleTimeString("th-TH", {
                    timeZone: "Asia/Bangkok"
                });
                labels.push(thaiTime);
                values.push(parseFloat(feed[`field${fieldNumber}`]));
                lastDataTime = new Date(feed.created_at);
            }
        });

        windChart.data.labels = labels;
        windChart.data.datasets[0].data = values;
        windChart.update();

        // ตรวจสอบว่าออฟไลน์หรือไม่
        if (lastDataTime) {
            const now = new Date();
            const diff = (now - lastDataTime) / 1000;

            if (diff > 30) {
                document.getElementById("status").innerText = "ระบบออฟไลน์";
                document.getElementById("status").style.color = "red";
            } else {
                document.getElementById("status").innerText = "เชื่อมต่อปกติ";
                document.getElementById("status").style.color = "lime";
            }
        }

    } catch (error) {
        document.getElementById("status").innerText = "เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
        document.getElementById("status").style.color = "red";
    }
}

fetchData();
setInterval(fetchData, 5000);
</script>

</body>
</html>
