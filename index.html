<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wind Monitor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#111;
    color:#ffffff;
    text-align:center;
}

h1{
    padding:30px;
    font-size:40px;
    letter-spacing:2px;
}

.container{
    padding:40px;
}

.card{
    background:#ffffff;
    color:#111;
    border-radius:20px;
    padding:30px;
    width:85%;
    max-width:1000px;
    margin:auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

iframe{
    border-radius:15px;
    border:none;
}
</style>
</head>

<body>

<h1>Wind Speed Monitor</h1>

<div class="container">
    <div class="card">
        <iframe width="100%" height="450"
        src="https://thingspeak.com/channels/3279904/charts/1?dynamic=true">
        </iframe>
    </div>
</div>

</body>
</html>
