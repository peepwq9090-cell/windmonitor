<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Dashboard – Saraphi Technical</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

:root{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#111;
    --header:#1f2937;
    --subtext:#6b7280;
    --border:rgba(0,0,0,0.08);
}

body.dark{
    --bg:#111827;
    --card:#1f2937;
    --text:#f3f4f6;
    --header:#000000;
    --subtext:#9ca3af;
    --border:rgba(255,255,255,0.08);
}

html, body{
    font-family:'Segoe UI', sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:background 0.3s, color 0.3s;
    min-height:100%;
}

/* ===== HEADER ===== */
.header{
    background:var(--header);
    color:white;
    padding:9px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-title .sub{ font-size:11px; opacity:0.8; margin-top:2px; }
.header-right{ display:flex; align-items:center; gap:12px; }

.wind-display{
    font-size:15px;
    background:rgba(255,255,255,0.1);
    padding:4px 12px;
    border-radius:8px;
}

.wind-display b{ font-size:20px; }

.badge{
    padding:4px 11px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    color:white;
}

.normal { background:#16a34a; }
.warning{ background:#d97706; }
.danger { background:#dc2626; }

.toggle-btn{
    cursor:pointer;
    padding:5px 13px;
    border-radius:20px;
    background:#4b5563;
    color:white;
    font-size:12px;
    border:none;
}

/* ===== DASHBOARD ===== */

.dashboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:10px;
    padding:10px;
}

.card{
    background:var(--card);
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.12);
    padding:8px 10px;
    display:flex;
    flex-direction:column;
}

.card.full{ grid-column:span 2; }

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
}

.card h3{ font-size:12px; }
.card .unit{ font-size:11px; color:var(--subtext); }

.chart-wrap{
    position:relative;
    height:250px;
}

/* ===== CONNECTION ===== */

.conn-bar{
    margin-top:6px;
    padding-top:6px;
    border-top:2px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.conn-dot{
    width:11px;
    height:11px;
    border-radius:50%;
    background:#16a34a;
}

.conn-dot.off{
    background:#dc2626;
}

.conn-label.ok{ color:#16a34a; }
.conn-label.fail{ color:#dc2626; }

</style>
</head>

<body>

<div class="header">
<div class="header-title">
<strong>SARAPHI TECHNICAL</strong>
<span style="font-weight:normal;font-size:13px;"> ( วิทยาลัยเทคนิคสารภี )</span>
<div class="sub">Wind Monitoring System</div>
</div>

<div class="header-right">
<div class="wind-display">Wind:&nbsp;<b id="windValue">–</b>&nbsp;m/s</div>
<span id="statusBadge" class="badge normal">NORMAL</span>
<button class="toggle-btn" id="toggleBtn" onclick="toggleDark()">🌙 Dark Mode</button>
</div>
</div>

<div class="dashboard">

<div class="card">
<div class="card-header">
<h3>สถิติรายชั่วโมง (24 ชั่วโมงล่าสุด)</h3>
<span class="unit">m/s · max/hr</span>
</div>
<div class="chart-wrap"><canvas id="chart24"></canvas></div>
</div>

<div class="card">
<div class="card-header">
<h3>ค่าปัจจุบันแบบเรียลไทม์ (5 นาทีล่าสุด)</h3>
<span class="unit">m/s · แสดงค่าทุก 1 นาที</span>
</div>
<div class="chart-wrap"><canvas id="chart5m"></canvas></div>
</div>

<div class="card full">
<div class="card-header">
<h3>สถิติสูงสุดรายวัน (ย้อนหลัง 1 สัปดาห์)</h3>
<span class="unit">m/s · max/day</span>
</div>
<div class="chart-wrap"><canvas id="chart7d"></canvas></div>

<div class="conn-bar">
<div class="conn-dot" id="connDot"></div>
<span class="conn-title">สถานการณ์ทำงาน :</span>
<span class="conn-label ok" id="connLabel">( เปิด )</span>
<span id="lastSeen"></span>
</div>

</div>
</div>

<script>

/* ===== CONFIG ===== */

const CH='3279862'
const RKEY='RW4WW5ICILK0P78L'
const BASE=`https://api.thingspeak.com/channels/${CH}`
const FIELD='field1'

/* ===== CHART FACTORY ===== */

function mkChart(id,color,maxTicks){

return new Chart(document.getElementById(id),{

type:'line',

data:{
labels:[],
datasets:[{
data:[],
borderColor:color,
backgroundColor:color.replace('1)','0.12)'),
borderWidth:2,
tension:0.3,
fill:true,
pointRadius:3
}]
},

options:{
responsive:true,
maintainAspectRatio:false,

plugins:{legend:{display:false}},

scales:{

y:{
beginAtZero:true,
max:50   /* แก้จาก 90 → 50 */
},

x:{
ticks:{
autoSkip:false,  /* ให้เวลาแสดงตลอด */
maxRotation:45
}
}

}

}

})

}

const c24=mkChart('chart24','rgba(59,130,246,1)',12)
const c5m=mkChart('chart5m','rgba(16,185,129,1)',10)
const c7d=mkChart('chart7d','rgba(245,158,11,1)',7)

function applyChart(chart,labels,data){
chart.data.labels=labels
chart.data.datasets[0].data=data
chart.update()
}

function toggleDark(){
const isDark=document.body.classList.toggle('dark')
document.getElementById('toggleBtn').innerText=isDark?'☀️ Light Mode':'🌙 Dark Mode'
}

</script>

</body>
</html>
